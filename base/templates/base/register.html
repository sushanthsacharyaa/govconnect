{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GovConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 0;
        }
        .register-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header h3 {
            color: #333;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-register {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .password-requirements {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <i class="fas fa-user-plus fa-3x" style="color: #11998e;"></i>
                <h3 class="mt-3">Create an Account</h3>
                <p class="text-muted">Join GovConnect today</p>
            </div>
            
            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
            
            <form id="registerForm">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Username*</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Email*</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" name="first_name">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" name="last_name">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Phone Number*</label>
                            <input type="tel" class="form-control" name="phone_number" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Role*</label>
                            <select class="form-select" name="role" required>
                                <option value="BIDDER">Bidder</option>
                                <option value="CONTRACTOR">Contractor</option>
                                <option value="PUBLIC_VIEWER">Public Viewer</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Password*</label>
                            <input type="password" class="form-control" name="password" id="password" required>
                            <div class="password-requirements">
                                Password must be at least 8 characters
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Confirm Password*</label>
                            <input type="password" class="form-control" name="password2" id="password2" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="termsCheck" required>
                    <label class="form-check-label" for="termsCheck">
                        I agree to the <a href="#">Terms and Conditions</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="fas fa-user-plus me-2"></i>Register
                </button>
            </form>
            
            <hr class="my-4">
            
            <div class="text-center">
                <small class="text-muted">Already have an account? </small>
                <a href="{% url 'login' %}">Login here</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#registerForm').on('submit', function(e) {
                e.preventDefault();
                
                // Validate passwords match
                const password = $('#password').val();
                const password2 = $('#password2').val();
                
                if (password !== password2) {
                    $('#errorAlert')
                        .removeClass('d-none')
                        .html('<i class="fas fa-exclamation-circle me-2"></i>Passwords do not match');
                    return;
                }
                
                if (password.length < 8) {
                    $('#errorAlert')
                        .removeClass('d-none')
                        .html('<i class="fas fa-exclamation-circle me-2"></i>Password must be at least 8 characters');
                    return;
                }
                
                // Hide previous alerts
                $('#errorAlert').addClass('d-none');
                
                // Disable button and show loading state
                const registerBtn = $('#registerBtn');
                const originalText = registerBtn.html();
                registerBtn.html('<i class="fas fa-spinner fa-spin me-2"></i>Registering...').prop('disabled', true);
                
                const formData = {
                    username: $('input[name="username"]').val(),
                    email: $('input[name="email"]').val(),
                    first_name: $('input[name="first_name"]').val(),
                    last_name: $('input[name="last_name"]').val(),
                    phone_number: $('input[name="phone_number"]').val(),
                    role: $('select[name="role"]').val(),
                    password: password,
                    password2: password2
                };
                
                $.ajax({
                    url: '/api/register/',
                    method: 'POST',
                    data: formData,
                    success: function(response) {
                        window.location.href = '/login/?registered=success';
                    },
                    error: function(xhr) {
                        registerBtn.html(originalText).prop('disabled', false);
                        
                        let errorMessage = 'Registration failed. Please try again.';
                        if (xhr.responseJSON) {
                            const errors = xhr.responseJSON;
                            errorMessage = '<ul class="mb-0">';
                            for (let key in errors) {
                                errorMessage += `<li>${key}: ${errors[key].join(', ')}</li>`;
                            }
                            errorMessage += '</ul>';
                        }
                        
                        $('#errorAlert')
                            .removeClass('d-none')
                            .html('<i class="fas fa-exclamation-circle me-2"></i>' + errorMessage);
                    }
                });
            });
        });
    </script>
</body>
</html>
